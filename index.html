<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyPong Arena 🏓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-24 font-sans selection:bg-blue-500">

    <header class="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900/80 sticky top-0 backdrop-blur-md z-30">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-blue-500 italic uppercase">POLYPONG</h1>
            <p id="stats-summary" class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">0 - 0</p>
        </div>
        <button onclick="openModal('match')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg shadow-blue-900/40">
            + MATCH
        </button>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="flex bg-slate-900 p-1 rounded-xl mb-6 border border-slate-800 sticky top-20 z-20">
            <button id="btn-matchs" onclick="switchTab('matchs')" class="flex-1 py-2 rounded-lg font-bold text-[10px] transition-all bg-slate-800 text-white uppercase tracking-tighter">Calendrier</button>
            <button id="btn-paris" onclick="switchTab('paris')" class="flex-1 py-2 rounded-lg font-bold text-[10px] transition-all text-slate-400 uppercase tracking-tighter">Paris & Classement</button>
        </div>

        <div id="tab-matchs" class="space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-3xl overflow-hidden shadow-2xl">
                <canvas id="mainChart" style="max-height: 200px;"></canvas>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-blue-900/20 border border-blue-500/20 p-3 rounded-2xl flex items-center gap-3">
                    <img id="img-maxime" src="" class="w-10 h-10 rounded-full object-cover border-2 border-blue-500 bg-slate-800">
                    <div><p class="text-[10px] font-bold text-blue-400 uppercase">Maxime</p><p id="wins-maxime" class="text-2xl font-black">0</p></div>
                </div>
                <div class="bg-red-900/20 border border-red-500/20 p-3 rounded-2xl flex items-center gap-3 justify-end">
                    <div class="text-right"><p class="text-[10px] font-bold text-red-400 uppercase">Alan</p><p id="wins-alan" class="text-2xl font-black">0</p></div>
                    <img id="img-alan" src="" class="w-10 h-10 rounded-full object-cover border-2 border-red-500 bg-slate-800">
                </div>
            </div>

            <div id="list-matchs" class="space-y-3"></div>
        </div>

        <div id="tab-paris" class="hidden space-y-6">
            <button onclick="openModal('pari')" class="w-full py-4 bg-slate-900 border-2 border-dashed border-slate-800 rounded-2xl text-blue-500 font-bold hover:bg-slate-800">
                + PLACER UN PARI
            </button>
            <div id="list-paris" class="space-y-2"></div>
            <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl">
                <h2 class="text-center font-black uppercase text-yellow-500 mb-4 italic tracking-widest">Leaderboard Potes</h2>
                <div id="leaderboard" class="space-y-2"></div>
            </div>
        </div>
        
        <button onclick="localStorage.clear(); location.reload();" class="mt-20 w-full text-[8px] text-slate-800 uppercase font-bold hover:text-red-500">Réinitialiser les données en cas de bug</button>
    </main>

    <div id="modal-match" class="fixed inset-0 bg-black/90 hidden z-50 p-6 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-6">
            <h2 class="font-bold mb-4 uppercase text-blue-500">Programmer Match</h2>
            <input id="match-label" type="text" placeholder="Titre (ex: Revanche)" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-3 outline-none">
            <input id="match-date" type="date" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-6 text-white outline-none">
            <div class="flex gap-2">
                <button onclick="closeModal('match')" class="flex-1 py-3 text-slate-500 font-bold uppercase text-[10px]">Annuler</button>
                <button onclick="saveMatch()" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold uppercase text-[10px]">Créer</button>
            </div>
        </div>
    </div>

    <div id="modal-pari" class="fixed inset-0 bg-black/90 hidden z-50 p-6 flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-6">
            <h2 class="font-bold mb-4 uppercase text-blue-500 text-center">Ton Pari</h2>
            <input id="pari-user" type="text" placeholder="Ton Prénom" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-3 outline-none text-white">
            <select id="pari-match-id" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-3 text-white outline-none"></select>
            <div class="grid grid-cols-2 gap-2 mb-6 text-[10px] font-bold">
                <button onclick="tempP='Maxime'" class="p-3 border border-slate-700 rounded-xl focus:bg-blue-600">MAXIME</button>
                <button onclick="tempP='Alan'" class="p-3 border border-slate-700 rounded-xl focus:bg-red-600">ALAN</button>
            </div>
            <button onclick="savePari()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase text-xs">Valider</button>
            <button onclick="closeModal('pari')" class="w-full py-2 mt-2 text-slate-600 text-[9px] uppercase">Fermer</button>
        </div>
    </div>

    <div id="modal-score" class="fixed inset-0 bg-black/90 hidden z-50 p-6 flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-6">
            <h2 class="font-bold mb-4 uppercase text-blue-500 text-center italic text-sm">Fin du match</h2>
            <div class="grid grid-cols-2 gap-2 mb-4 text-[10px] font-bold uppercase">
                <button onclick="tempW='Maxime'" class="p-4 border border-slate-700 rounded-xl focus:bg-blue-600">Maxime Gagne</button>
                <button onclick="tempW='Alan'" class="p-4 border border-slate-700 rounded-xl focus:bg-red-600">Alan Gagne</button>
            </div>
            <input id="final-score" type="text" placeholder="Score final (ex: 11-7)" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mb-6 text-center text-xl font-black outline-none text-white font-mono">
            <button onclick="validateMatch()" class="w-full py-4 bg-green-600 rounded-xl font-bold uppercase text-xs">Enregistrer le score</button>
        </div>
    </div>

    <script>
        // --- TES PHOTOS (VÉRIFIÉES) ---
        const PLAYER_PHOTOS = {
            'Maxime': 'https://i.postimg.cc/4dyK7Tz3/IMG-1306.png',
            'Alan': 'https://i.postimg.cc/Jn0yDWbz/Resized-20241214-1341581.jpg'
        };
	const VS_IMAGE_URL = 'https://i.postimg.cc/Z51B9Qwx/image.png'; // REMPLACE PAR L'URL DE TON IMAGE

        let tempP = ""; let tempW = ""; let activeId = null;
        let matchs = JSON.parse(localStorage.getItem('pp_v3_matchs')) || [];
        let paris = JSON.parse(localStorage.getItem('pp_v3_paris')) || [];
        let myChart = null;

        function openModal(id, mId = null) { 
            if(id === 'score') activeId = mId;
            document.getElementById('modal-'+id).classList.remove('hidden');
            if(id === 'pari') {
                const sel = document.getElementById('pari-match-id');
                const open = matchs.filter(m => !m.winner);
                sel.innerHTML = open.length ? open.map(m => `<option value="${m.id}">${m.label}</option>`).join('') : '<option disabled>Aucun match prévu</option>';
            }
        }
        function closeModal(id) { document.getElementById('modal-'+id).classList.add('hidden'); }

        function switchTab(t) {
            document.getElementById('tab-matchs').classList.toggle('hidden', t !== 'matchs');
            document.getElementById('tab-paris').classList.toggle('hidden', t !== 'paris');
            document.getElementById('btn-matchs').className = t === 'matchs' ? "flex-1 py-2 rounded-lg font-bold text-[10px] bg-slate-800 text-white shadow uppercase" : "flex-1 py-2 rounded-lg font-bold text-[10px] text-slate-400 uppercase";
            document.getElementById('btn-paris').className = t === 'paris' ? "flex-1 py-2 rounded-lg font-bold text-[10px] bg-slate-800 text-white shadow uppercase" : "flex-1 py-2 rounded-lg font-bold text-[10px] text-slate-400 uppercase";
            if(t === 'matchs') updateChart();
        }

        function saveMatch() {
            const l = document.getElementById('match-label').value;
            const d = document.getElementById('match-date').value;
            if(!l || !d) return alert("Remplis tout !");
            matchs.unshift({ id: Date.now(), label: l, date: d, winner: null, score: null });
            localStorage.setItem('pp_v3_matchs', JSON.stringify(matchs));
            render(); closeModal('match');
            document.getElementById('match-label').value = "";
        }

        function savePari() {
            const u = document.getElementById('pari-user').value;
            const mId = document.getElementById('pari-match-id').value;
            if(!u || !tempP || !mId) return alert("Nom + Prono !");
            paris.unshift({ user: u, prono: tempP, matchId: parseInt(mId) });
            localStorage.setItem('pp_v3_paris', JSON.stringify(paris));
            render(); closeModal('pari');
        }

        function validateMatch() {
            const s = document.getElementById('final-score').value;
            if(!tempW || !s) return alert("Vainqueur + Score !");
            const m = matchs.find(x => x.id === activeId);
            m.winner = tempW; m.score = s;
            localStorage.setItem('pp_v3_matchs', JSON.stringify(matchs));
            render(); closeModal('score');
            document.getElementById('final-score').value = "";
            tempW = "";
        }

        function updateChart() {
            const mW = matchs.filter(m => m.winner === 'Maxime').length;
            const aW = matchs.filter(m => m.winner === 'Alan').length;
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['MAXIME', 'ALAN'],
                    datasets: [{
                        data: [mW, aW],
                        backgroundColor: ['#3b82f6', '#ef4444'],
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false, grid: { display: false }, suggestedMax: Math.max(mW, aW) + 1 },
                        y: { grid: { display: false }, ticks: { color: '#fff', font: { weight: 'bold' } } }
                    }
                }
            });
            document.getElementById('stats-summary').innerText = `MAXIME ${mW} - ${aW} ALAN`;
            document.getElementById('wins-maxime').innerText = mW;
            document.getElementById('wins-alan').innerText = aW;
        }

        function render() {
            // Photos Dashboard
            document.getElementById('img-maxime').src = PLAYER_PHOTOS['Maxime'];
            document.getElementById('img-alan').src = PLAYER_PHOTOS['Alan'];

            const lm = document.getElementById('list-matchs');
            lm.innerHTML = matchs.map(m => `
    <div class="bg-slate-900 p-4 rounded-2xl border ${m.winner ? 'border-slate-800' : 'border-blue-500/50 shadow-lg shadow-blue-500/5 animate-pulse'} flex justify-between items-center group transition-all shadow-lg hover:border-slate-600 transition-all">
        <div class="flex items-center gap-3">
            <img src="${m.winner ? PLAYER_PHOTOS[m.winner] : VS_IMAGE_URL}" class="w-10 h-10 border border-slate-700 object-cover">
            <div>
                <p class="text-[9px] text-slate-600 font-bold uppercase">${m.date}</p>
                <p class="font-bold text-white uppercase text-xs">${m.label}</p>
                ${m.winner ? `<p class="text-[10px] font-black uppercase ${m.winner==='Maxime'?'text-blue-500':'text-red-500'} italic tracking-tighter">${m.winner} Gagne</p>` : `<button onclick="openModal('score', ${m.id})" class="text-[10px] text-blue-500 font-bold uppercase mt-2 hover:text-white transition-all underline decoration-dotted">Clôturer Match</button>`}
            </div>
        </div>
        <div class="text-xl font-mono font-black text-slate-300 tracking-wider">${m.score || '⏳'}</div>
    </div>
`).join('');

            const lp = document.getElementById('list-paris');
            const scores = {};
            lp.innerHTML = paris.map(p => {
                const m = matchs.find(x => x.id === p.matchId);
                let res = "ATTENTE"; let cl = "text-slate-500";
                if(m && m.winner) {
                    if(m.winner === p.prono) { res = "GAGNÉ"; cl = "text-green-500"; scores[p.user] = (scores[p.user] || 0) + 1; }
                    else { res = "PERDU"; cl = "text-red-500"; scores[p.user] = (scores[p.user] || 0); }
                }
                return `<div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800 flex justify-between text-[10px] uppercase font-bold">
                    <span>${p.user} : ${p.prono}</span><span class="${cl}">${res}</span>
                </div>`;
            }).join('');

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = Object.entries(scores).sort((a,b) => b[1]-a[1]).map(([n, pts], i) => `
                <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-white/5">
                    <span class="font-bold text-xs">${i+1}. ${n}</span><span class="font-black text-blue-400 italic">${pts} PTS</span>
                </div>
            `).join('') || '<p class="text-center text-slate-700 text-[9px] uppercase font-bold py-4">Aucun point</p>';
            
            updateChart();
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyPong PRO 🏓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-active-blue { background: #3b82f6 !important; color: white !important; }
        .btn-active-red { background: #ef4444 !important; color: white !important; }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .fade-up { animation: fade 0.4s ease-out; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-24 overflow-x-hidden">

    <header class="p-5 flex justify-between items-center sticky top-0 z-[40] glass border-b border-white/5">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-blue-500 italic uppercase">POLYPONG LIVE</h1>
            <p id="stats-summary" class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mt-1">Connexion en cours...</p>
        </div>
        <button onclick="openModal('match')" class="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-[10px] shadow-lg active:scale-95 transition-all uppercase">+ MATCH</button>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="flex bg-slate-900/50 p-1.5 rounded-2xl mb-8 border border-white/5">
            <button id="btn-matchs" onclick="switchTab('matchs')" class="flex-1 py-3 rounded-xl font-black text-[11px] bg-blue-600 text-white uppercase transition-all">Matchs</button>
            <button id="btn-paris" onclick="switchTab('paris')" class="flex-1 py-3 rounded-xl font-black text-[11px] text-slate-500 uppercase transition-all">Paris</button>
        </div>

        <div id="tab-matchs" class="space-y-6">
            <div class="glass p-5 rounded-[2rem]"><canvas id="mainChart" style="max-height: 140px;"></canvas></div>
            <div id="list-matchs" class="space-y-4"></div>
        </div>

        <div id="tab-paris" class="hidden space-y-8">
            <button onclick="openModal('pari')" class="w-full py-6 bg-blue-600/10 border-2 border-dashed border-blue-500/20 rounded-[2rem] text-blue-400 font-black uppercase text-xs tracking-widest hover:bg-blue-600/20 transition-all">+ PLACER UN PARI</button>
            <div id="list-paris" class="space-y-6"></div>
            <div class="glass p-6 rounded-[2rem]">
                <h2 class="text-center font-black uppercase text-amber-500 mb-6 italic tracking-widest text-xs">Classement</h2>
                <div id="leaderboard" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="modal-match" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="font-black mb-6 uppercase text-blue-400 text-sm">Nouveau Duel</h2>
            <input id="match-label" type="text" placeholder="Nom du match" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl mb-3 text-white outline-none">
            <div class="grid grid-cols-2 gap-2 mb-8">
                <input id="match-date" type="date" class="bg-slate-800 border border-white/10 p-3 rounded-2xl text-white text-[10px] outline-none">
                <input id="match-time" type="time" class="bg-slate-800 border border-white/10 p-3 rounded-2xl text-white text-[10px] outline-none">
            </div>
            <button onclick="saveMatch()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-xs shadow-lg mb-2">Créer</button>
            <button onclick="closeModal('match')" class="text-slate-500 font-bold uppercase text-[10px]">Annuler</button>
        </div>
    </div>

    <div id="modal-pari" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="font-black mb-6 uppercase text-blue-400 text-center text-[10px] tracking-widest">TON CHOIX</h2>
            <input id="pari-user" type="text" placeholder="Ton Prénom" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl mb-4 text-white uppercase font-bold outline-none">
            <select id="pari-match-id" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl mb-6 text-white text-xs outline-none"></select>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button id="pari-maxime" onclick="selectPari('Maxime')" class="p-5 border border-white/10 rounded-2xl font-black uppercase text-[10px]">Maxime</button>
                <button id="pari-alan" onclick="selectPari('Alan')" class="p-5 border border-white/10 rounded-2xl font-black uppercase text-[10px]">Alan</button>
            </div>
            <button onclick="savePari()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase text-xs">Valider</button>
            <button onclick="closeModal('pari')" class="w-full mt-4 text-slate-500 text-[10px] uppercase font-bold text-center">Retour</button>
        </div>
    </div>

    <div id="modal-score" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8">
            <h2 class="font-black mb-6 uppercase text-green-400 text-center text-xs">Résultat</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button id="win-maxime" onclick="selectWinner('Maxime')" class="p-5 border border-white/10 rounded-2xl font-black uppercase text-[10px]">Maxime</button>
                <button id="win-alan" onclick="selectWinner('Alan')" class="p-5 border border-white/10 rounded-2xl font-black uppercase text-[10px]">Alan</button>
            </div>
            <input id="final-score" type="text" placeholder="Score final" class="w-full bg-slate-800 border border-white/10 p-5 rounded-2xl mb-8 text-center text-2xl font-black text-white outline-none">
            <button onclick="validateMatch()" class="w-full py-5 bg-green-600 rounded-2xl font-black uppercase text-xs">Enregistrer</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3c2XjiG6WQvhPFwgReFOIlO61Z86OqHk",
            authDomain: "polypong-e47fd.firebaseapp.com",
            databaseURL: "https://polypong-e47fd-default-rtdb.europe-west1.firebasedatabase.app/", 
            projectId: "polypong-e47fd",
            storageBucket: "polypong-e47fd.firebasestorage.app",
            messagingSenderId: "824324243547",
            appId: "1:824324243547:web:10c720e92c65435d45ff7e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const PHOTOS = { 'Maxime': 'https://i.postimg.cc/4dyK7Tz3/IMG-1306.png', 'Alan': 'https://i.postimg.cc/Jn0yDWbz/Resized-20241214-1341581.jpg' };
        const VS_ICON = 'https://cdn-icons-png.flaticon.com/512/771/771241.png';

        let tempP = ""; let tempW = ""; let activeId = null;
        let matchs = []; let paris = []; let myChart = null;

        db.ref('matchs').on('value', s => { 
            const d = s.val();
            matchs = d ? Object.entries(d).map(([id, v]) => ({...v, id: id.toString()})) : []; 
            render(); 
        });

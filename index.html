<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyPong Master Series 🏓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .btn-active-blue { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%) !important; color: white !important; border: none !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .btn-active-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important; color: white !important; border: none !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .btn-active-purple { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%) !important; color: white !important; border: none !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        .btn-active-gold { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%) !important; color: white !important; border: none !important; box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }
        
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
        
        input, select { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="p-5 flex justify-between items-center sticky top-0 z-50 glass border-b border-white/5">
        <div>
            <h1 class="text-lg font-black tracking-tighter text-blue-500 italic uppercase">POLYPONG LIVE</h1>
            <p id="stats-summary" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Tour Series</p>
        </div>
        <button onclick="if(checkAdmin()) openModal('match')" class="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-lg hover:scale-105 active:scale-95 transition-all">+ DUEL</button>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div id="global-scoreboard" class="glass p-6 rounded-[2rem] mb-8 shadow-2xl relative overflow-hidden fade-in border-2 border-blue-500/10">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3 text-left">
                    <img referrerpolicy="no-referrer" id="score-photo-maxime" src="" alt="Maxime" class="w-16 h-16 rounded-2xl object-cover border-4 border-blue-600/50 shadow-lg">
                    <div>
                        <span class="block text-[10px] text-blue-400 font-black uppercase tracking-widest">Maxime</span>
                        <span id="score-count-maxime" class="block text-5xl font-black italic tracking-tighter text-white">0</span>
                    </div>
                </div>
                <div class="text-3xl font-black text-slate-700 italic">VS</div>
                <div class="flex items-center gap-3 text-right flex-row-reverse">
                    <img referrerpolicy="no-referrer" id="score-photo-alan" src="" alt="Alan" class="w-16 h-16 rounded-2xl object-cover border-4 border-red-600/50 shadow-lg">
                    <div>
                        <span class="block text-[10px] text-red-400 font-black uppercase tracking-widest">Alan</span>
                        <span id="score-count-alan" class="block text-5xl font-black italic tracking-tighter text-white">0</span>
                    </div>
                </div>
            </div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-red-600/10 rounded-full blur-3xl"></div>
        </div>

        <div class="flex bg-slate-900/50 p-1.5 rounded-2xl mb-8 border border-white/5">
            <button id="btn-matchs" onclick="switchTab('matchs')" class="flex-1 py-3.5 rounded-xl font-black text-[11px] bg-blue-600 text-white uppercase transition-all">Matchs</button>
            <button id="btn-paris" onclick="switchTab('paris')" class="flex-1 py-3.5 rounded-xl font-black text-[11px] text-slate-500 uppercase transition-all">Pronostics</button>
        </div>

        <div id="tab-matchs" class="space-y-4">
            <div id="list-matchs" class="space-y-4"></div>
        </div>

        <div id="tab-paris" class="hidden space-y-6">
            <button onclick="openModal('pari')" class="w-full py-6 bg-blue-600/10 border-2 border-dashed border-blue-500/30 rounded-[2rem] text-blue-400 font-black text-xs uppercase hover:bg-blue-600/20 transition-all">+ PLACER UN PARI</button>
            <div id="list-paris" class="space-y-6"></div>
            <div class="glass p-6 rounded-[2.5rem] mt-10 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-5 text-6xl"><i class="fa-solid fa-trophy"></i></div>
                <h2 class="text-center font-black uppercase text-amber-500 mb-6 text-xs tracking-[0.2em] italic">Classement Général</h2>
                <div id="leaderboard" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="modal-match" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h2 class="font-black mb-6 text-blue-400 uppercase text-sm">Nouveau Duel</h2>
            <input id="match-label" type="text" placeholder="Titre (ex: Match du soir)" class="w-full p-4 rounded-2xl mb-3 outline-none">
            <div class="grid grid-cols-2 gap-2 mb-8">
                <input id="match-date" type="date" class="p-3 rounded-2xl text-[10px] outline-none">
                <input id="match-time" type="time" class="p-3 rounded-2xl text-[10px] outline-none">
            </div>
            <button onclick="saveMatch()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-xs shadow-lg mb-2 text-white">Créer</button>
            <button onclick="closeModal('match')" class="text-slate-500 text-[10px] uppercase font-bold">Annuler</button>
        </div>
    </div>

    <div id="modal-pari" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="font-black mb-6 text-blue-400 text-center text-xs uppercase tracking-widest">Ton Pronostic</h2>
            <input id="pari-user" type="text" placeholder="Ton Prénom" class="w-full p-4 rounded-2xl mb-4 uppercase font-bold outline-none">
            <select id="pari-match-id" class="w-full p-4 rounded-2xl mb-4 text-xs outline-none"></select>
            
            <div class="flex gap-1 mb-4 bg-slate-800/50 p-1.5 rounded-xl">
                <button id="type-vainqueur" onclick="switchBetType('vainqueur')" class="flex-1 py-2 rounded-lg bg-blue-600 text-white text-[9px] font-black uppercase transition-all">Vainqueur<br><span class="text-[7px] opacity-70">1 PT</span></button>
                <button id="type-sets" onclick="switchBetType('sets')" class="flex-1 py-2 rounded-lg text-slate-500 text-[9px] font-black uppercase transition-all">Sets<br><span class="text-[7px] opacity-70">1 PT</span></button>
                <button id="type-combo" onclick="switchBetType('combo')" class="flex-1 py-2 rounded-lg text-slate-500 text-[9px] font-black uppercase transition-all">Combiné<br><span class="text-[7px] opacity-70 text-amber-300">3 PTS</span></button>
            </div>

            <div id="choix-vainqueur" class="grid grid-cols-2 gap-3 mb-6">
                <button id="pari-maxime" onclick="selectPari('Maxime')" class="p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase transition-all">Maxime</button>
                <button id="pari-alan" onclick="selectPari('Alan')" class="p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase transition-all">Alan</button>
            </div>

            <div id="choix-sets" class="hidden grid grid-cols-2 gap-3 mb-6">
                <button id="pari-2sets" onclick="selectPari('2 SETS')" class="p-4 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all">2 Sets</button>
                <button id="pari-3sets" onclick="selectPari('3 SETS')" class="p-4 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all">3 Sets</button>
            </div>

            <div id="choix-combo" class="hidden space-y-3 mb-6">
                <p class="text-[9px] text-center text-slate-400 font-bold uppercase">1. Qui gagne ?</p>
                <div class="grid grid-cols-2 gap-2">
                    <button id="combo-w-maxime" onclick="selectComboW('Maxime')" class="p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all">Maxime</button>
                    <button id="combo-w-alan" onclick="selectComboW('Alan')" class="p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all">Alan</button>
                </div>
                <p class="text-[9px] text-center text-slate-400 font-bold uppercase mt-2">2. En combien de sets ?</p>
                <div class="grid grid-cols-2 gap-2">
                    <button id="combo-s-2" onclick="selectComboS('2')" class="p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all">2</button>
                    <button id="combo-s-3" onclick="selectComboS('3')" class="p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all">3</button>
                </div>
            </div>

            <button onclick="savePari()" class="w-full py-5 bg-blue-600 rounded-2xl font-black text-xs uppercase text-white shadow-xl">Valider</button>
            <button onclick="closeModal('pari')" class="w-full mt-4 text-slate-500 text-[10px] uppercase text-center font-bold">Retour</button>
        </div>
    </div>

    <div id="modal-score" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="font-black mb-6 text-green-400 text-center text-xs uppercase">Clôturer le Match</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button id="win-maxime" onclick="selectWinner('Maxime')" class="p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase transition-all">Maxime</button>
                <button id="win-alan" onclick="selectWinner('Alan')" class="p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase transition-all">Alan</button>
            </div>
            <input id="final-score" type="text" placeholder="Score final (ex: 2-1 (11-8 8-11 11-5))" class="w-full p-5 rounded-2xl mb-8 text-center text-sm font-black outline-none">
            <button onclick="validateMatch()" class="w-full py-5 bg-green-600 rounded-2xl font-black text-xs uppercase text-white shadow-xl">Enregistrer</button>
            <button onclick="closeModal('score')" class="w-full mt-2 text-slate-500 text-[10px] uppercase text-center font-bold">Annuler</button>
        </div>
    </div>

    <script>
        // --- 🔒 NOUVELLE ZONE SÉCURITÉ ADMIN OBFUSQUÉE ---
        // Gabin, va t'entraîner au ping-pong au lieu d'inspecter le code !
        const _0x1a2b = [0x6d, 0x61, 0x78, 0x69, 0x6d, 0x65, 0x62, 0x6f, 0x73, 0x73]; 
        function checkAdmin() {
            if (sessionStorage.getItem('_xAuth') === '1') return true;
            let _0x3c = prompt("🔒 Accès restreint. Entrez la clé :");
            if (!_0x3c) return false;
            let _0x4d = _0x3c.split('').map(x=>x.charCodeAt(0));
            let _0x5e = _0x4d.length === _0x1a2b.length && _0x4d.every((v,i) => v === _0x1a2b[i]);
            if (_0x5e) { sessionStorage.setItem('_xAuth', '1'); return true; }
            alert("❌ Tentative de piratage échouée."); return false;
        }
        // ---------------------------------

        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB3c2XjiG6WQvhPFwgReFOIlO61Z86OqHk",
            authDomain: "polypong-e47fd.firebaseapp.com",
            databaseURL: "https://polypong-e47fd-default-rtdb.europe-west1.firebasedatabase.app/", 
            projectId: "polypong-e47fd",
            storageBucket: "polypong-e47fd.firebasestorage.app",
            messagingSenderId: "824324243547",
            appId: "1:824324243547:web:10c720e92c65435d45ff7e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const PHOTOS = { 'Maxime': 'https://i.postimg.cc/4dyK7Tz3/IMG-1306.png', 'Alan': 'https://i.postimg.cc/Jn0yDWbz/Resized-20241214-1341581.jpg' };
        const VS_ICON = 'https://cdn-icons-png.flaticon.com/512/771/771241.png';

        let currentBetType = 'vainqueur';
        let tempP = ""; let comboW = ""; let comboS = ""; 
        let tempW = ""; let activeId = null;
        let matchs = []; let paris = [];

        db.ref('matchs').on('value', s => { const d = s.val(); matchs = d ? Object.entries(d).map(([id, v]) => ({...v, id})) : []; render(); });
        db.ref('paris').on('value', s => { const d = s.val(); paris = d ? Object.entries(d).map(([id, v]) => ({...v, id})) : []; render(); });

        function formatTennisScore(scoreStr) {
            if (!scoreStr) return '';
            let cleanStr = scoreStr.replace(/\s+/g, '');
            let mainMatch = cleanStr.match(/^\s*(\d+)\s*[-/]\s*(\d+)/);
            if (!mainMatch) return `<div class="text-2xl font-black italic tracking-tighter text-white">${scoreStr}</div>`;

            let mainM = mainMatch[1]; let mainA = mainMatch[2];
            let setsHtml = '';
            let parensMatch = scoreStr.match(/\((.*?)\)/);
            
            if (parensMatch) {
                let insideParens = parensMatch[1];
                let setPairs = insideParens.match(/\d+\s*[-/:]\s*\d+/g);
                if (setPairs) {
                    let rowM = ''; let rowA = '';
                    setPairs.forEach(pair => {
                        let parts = pair.split(/[-/:]/);
                        if (parts.length >= 2) {
                            let mVal = parseInt(parts[0].trim()); let aVal = parseInt(parts[1].trim());
                            let mClass = mVal > aVal ? 'text-white' : 'text-slate-600';
                            let aClass = aVal > mVal ? 'text-white' : 'text-slate-600';
                            rowM += `<span class="${mClass} w-4 text-center">${mVal}</span>`;
                            rowA += `<span class="${aClass} w-4 text-center">${aVal}</span>`;
                        }
                    });
                    if (rowM && rowA) setsHtml = `<div class="flex flex-col text-[11px] font-black mr-3 pr-3 border-r border-white/10 gap-0.5"><div class="flex gap-2 text-blue-400 items-center justify-end">${rowM}</div><div class="flex gap-2 text-red-400 items-center justify-end">${rowA}</div></div>`;
                }
            }
            return `<div class="flex items-center justify-end">${setsHtml}<div class="text-3xl font-black italic tracking-tighter text-white">${mainM}-${mainA}</div></div>`;
        }

        function switchTab(t) {
            document.getElementById('tab-matchs').classList.toggle('hidden', t !== 'matchs');
            document.getElementById('tab-paris').classList.toggle('hidden', t !== 'paris');
            document.getElementById('btn-matchs').className = t === 'matchs' ? "flex-1 py-3.5 rounded-xl font-black text-[11px] bg-blue-600 text-white uppercase" : "flex-1 py-3.5 rounded-xl font-black text-[11px] text-slate-500 uppercase";
            document.getElementById('btn-paris').className = t === 'paris' ? "flex-1 py-3.5 rounded-xl font-black text-[11px] bg-blue-600 text-white uppercase" : "flex-1 py-3.5 rounded-xl font-black text-[11px] text-slate-500 uppercase";
        }

        function switchBetType(t) {
            currentBetType = t; tempP = ""; comboW = ""; comboS = ""; resetBetStyles();
            document.getElementById('choix-vainqueur').classList.toggle('hidden', t !== 'vainqueur');
            document.getElementById('choix-sets').classList.toggle('hidden', t !== 'sets');
            document.getElementById('choix-combo').classList.toggle('hidden', t !== 'combo');
            
            document.getElementById('type-vainqueur').className = t === 'vainqueur' ? "flex-1 py-2 rounded-lg bg-blue-600 text-white text-[9px] font-black uppercase transition-all" : "flex-1 py-2 rounded-lg text-slate-500 text-[9px] font-black uppercase transition-all";
            document.getElementById('type-sets').className = t === 'sets' ? "flex-1 py-2 rounded-lg bg-purple-600 text-white text-[9px] font-black uppercase transition-all" : "flex-1 py-2 rounded-lg text-slate-500 text-[9px] font-black uppercase transition-all";
            document.getElementById('type-combo').className = t === 'combo' ? "flex-1 py-2 rounded-lg bg-amber-500 text-slate-950 text-[9px] font-black uppercase transition-all" : "flex-1 py-2 rounded-lg text-slate-500 text-[9px] font-black uppercase transition-all";
        }

        function resetBetStyles() {
            document.getElementById('pari-maxime').className = 'p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase transition-all';
            document.getElementById('pari-alan').className = 'p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase transition-all';
            ['2','3'].forEach(n => document.getElementById('pari-'+n+'sets').className = 'p-4 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all');
            document.getElementById('combo-w-maxime').className = 'p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all';
            document.getElementById('combo-w-alan').className = 'p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all';
            ['2','3'].forEach(n => document.getElementById('combo-s-'+n).className = 'p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all');
        }

        function selectPari(p) { 
            tempP = p; resetBetStyles();
            if (p === 'Maxime') document.getElementById('pari-maxime').className = 'p-5 rounded-2xl font-black uppercase text-[10px] btn-active-blue'; 
            else if (p === 'Alan') document.getElementById('pari-alan').className = 'p-5 rounded-2xl font-black uppercase text-[10px] btn-active-red'; 
            else if (p.includes('SETS')) document.getElementById('pari-'+p.charAt(0)+'sets').className = 'p-4 rounded-xl font-black uppercase text-[10px] btn-active-purple';
        }

        function selectComboW(p) {
            comboW = p;
            document.getElementById('combo-w-maxime').className = p === 'Maxime' ? 'p-3 rounded-xl font-black uppercase text-[10px] btn-active-blue' : 'p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all';
            document.getElementById('combo-w-alan').className = p === 'Alan' ? 'p-3 rounded-xl font-black uppercase text-[10px] btn-active-red' : 'p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all';
        }

        function selectComboS(n) {
            comboS = n;
            ['2','3'].forEach(x => document.getElementById('combo-s-'+x).className = 'p-3 border border-white/10 rounded-xl font-black text-[10px] uppercase transition-all');
            document.getElementById('combo-s-'+n).className = 'p-3 rounded-xl font-black uppercase text-[10px] btn-active-gold';
        }

        function saveMatch() {
            const l = document.getElementById('match-label').value; const d = document.getElementById('match-date').value; const t = document.getElementById('match-time').value;
            if(!l || !d || !t) return alert("Remplis tout !");
            db.ref('matchs/' + Date.now().toString()).set({ id: Date.now().toString(), label: l, date: d, time: t, startTime: new Date(d + 'T' + t).getTime(), winner: null, score: null });
            closeModal('match');
        }

        function savePari() {
            const u = document.getElementById('pari-user').value.trim(); const mId = document.getElementById('pari-match-id').value;
            if(!u || mId === "null") return alert("Prénom ou Match manquant !");
            
            let finalProno = tempP;
            if(currentBetType === 'combo') {
                if(!comboW || !comboS) return alert("Pour un combiné, tu dois choisir LE VAINQUEUR ET LE NB DE SETS !");
                finalProno = comboW + " en " + comboS + " SETS";
            } else {
                if(!finalProno) return alert("Choisis ton prono !");
            }

            const target = matchs.find(m => m.id === mId);
            if(target && Date.now() >= target.startTime) return alert("Trop tard ! Le match a commencé.");
            if(paris.find(p => p.user.toLowerCase() === u.toLowerCase() && p.matchId === mId)) return alert("Tu as déjà parié sur ce match ! Un seul prono par personne.");
            
            db.ref('paris/').push({ user: u, prono: finalProno, matchId: mId });
            closeModal('pari');
        }

        function validateMatch() {
            const s = document.getElementById('final-score').value;
            if(!tempW || !s) return alert("Choisis le vainqueur !");
            db.ref('matchs/' + activeId).update({ winner: tempW, score: s });
            closeModal('score');
        }

        function openModal(id, mId = null) { 
            activeId = mId;
            if(id === 'pari') {
                const now = Date.now();
                const dispo = matchs.filter(m => !m.winner && m.startTime > now);
                document.getElementById('pari-match-id').innerHTML = dispo.length ? dispo.map(m => `<option value="${m.id}">${m.label} (${m.time})</option>`).join('') : '<option value="null">Aucun match ouvert</option>';
                switchBetType('vainqueur');
            }
            if(id === 'score') {
                tempW = ""; document.getElementById('win-maxime').className = 'p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase'; document.getElementById('win-alan').className = 'p-5 border border-white/10 rounded-2xl font-black text-[10px] uppercase'; document.getElementById('final-score').value = "";
            }
            document.getElementById('modal-'+id).classList.remove('hidden'); 
        }

        function closeModal(id) { document.getElementById('modal-'+id).classList.add('hidden'); }
        function selectWinner(p) { tempW = p; document.getElementById('win-maxime').className = p === 'Maxime' ? 'p-5 rounded-2xl font-black uppercase text-[10px] btn-active-blue' : 'p-5 border border-white/10 rounded-2xl font-black uppercase text-[10px] transition-all'; document.getElementById('win-alan').className = p === 'Alan' ? 'p-5 rounded-2xl font-black uppercase text-[10px] btn-active-red' : 'p-5 border border-white/10 rounded-2xl font-black uppercase text-[10px] transition-all'; }
        
        function deleteMatch(id) { if(!checkAdmin()) return; if(confirm("Supprimer ?")) db.ref('matchs/' + id).remove(); }
        function deletePari(id) { if(!checkAdmin()) return; if(confirm("Supprimer ?")) db.ref('paris/' + id).remove(); }

        function render() {
            const now = Date.now();
            const mW = matchs.filter(m => m.winner === 'Maxime').length;
            const aW = matchs.filter(m => m.winner === 'Alan').length;

            document.getElementById('score-photo-maxime').src = PHOTOS['Maxime'];
            document.getElementById('score-photo-alan').src = PHOTOS['Alan'];
            document.getElementById('score-count-maxime').innerText = mW;
            document.getElementById('score-count-alan').innerText = aW;

            document.getElementById('list-matchs').innerHTML = matchs.sort((a,b)=>b.id-a.id).map(m => {
                const isLive = !m.winner && now >= m.startTime;
                let dateAffichee = m.date || '';
                if (m.startTime) { const d = new Date(m.startTime); if (!isNaN(d)) dateAffichee = d.toLocaleDateString('fr-FR', {day: '2-digit', month: '2-digit'}); }
                
                const scoreHTML = m.winner ? formatTennisScore(m.score) : `<button onclick="if(checkAdmin()) openModal('score', '${m.id}')" class="bg-blue-600 px-4 py-1.5 rounded-xl text-[8px] font-black uppercase text-white shadow-lg active:scale-95 transition-all">Clôturer</button>`;

                return `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center relative transition-all ${isLive ? 'border-red-500/40 shadow-[0_0_15px_rgba(239,68,68,0.1)]' : ''}">
                    <div class="flex items-center gap-4">
                        <div class="relative"><img src="${m.winner ? PHOTOS[m.winner] : VS_ICON}" class="w-12 h-12 rounded-2xl object-cover border border-white/10 shadow-lg">${isLive ? '<div class="absolute -top-1 -right-1 live-dot border-2 border-slate-950"></div>' : ''}</div>
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">${dateAffichee} ${m.time ? 'à '+m.time : ''}</p>
                            <div class="flex items-center gap-2">
                                <h3 class="font-black text-white text-xs uppercase italic tracking-tight">${m.label}</h3>
                                <button onclick="deleteMatch('${m.id}')" class="text-white/10 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash text-[9px]"></i></button>
                            </div>
                            <p class="text-[9px] font-black uppercase mt-1 ${m.winner==='Maxime'?'text-blue-400':m.winner==='Alan'?'text-red-400':'text-slate-500'}">${m.winner ? m.winner + ' GAGNE' : (isLive ? 'EN DIRECT' : 'À VENIR')}</p>
                        </div>
                    </div>
                    <div>${scoreHTML}</div>
                </div>`;
            }).join('') || '<p class="text-center text-slate-600 py-10 uppercase font-bold text-[10px]">Aucun match programmé</p>';

            const pts = {};
            document.getElementById('list-paris').innerHTML = [...matchs].sort((a,b)=>b.id-a.id).map(m => {
                const mp = paris.filter(p => p.matchId === m.id);
                if (!mp.length) return '';
                return `
                <div class="mb-5 fade-in">
                    <h4 class="text-[9px] font-black text-slate-500 uppercase px-3 mb-2 tracking-widest">${m.label}</h4>
                    <div class="space-y-2">
                        ${mp.reverse().map(p => {
                            let res = "EN ATTENTE"; let cl = "text-slate-600";
                            
                            if(m.winner) { 
                                let matchScoreClean = m.score ? m.score.replace(/\s+/g, '').match(/^(\d+)[-/](\d+)/) : null;
                                let totalSetsPlayed = matchScoreClean ? parseInt(matchScoreClean[1]) + parseInt(matchScoreClean[2]) : 0;

                                if (p.prono.includes(' en ')) {
                                    let parts = p.prono.split(' en ');
                                    let betW = parts[0]; let betS = parseInt(parts[1]);
                                    if(totalSetsPlayed > 0) {
                                        if (m.winner === betW && totalSetsPlayed === betS) { res = "GAGNÉ 🎯 (+3)"; cl = "text-amber-400"; pts[p.user] = (pts[p.user] || 0) + 3; }
                                        else { res = "PERDU ❌"; cl = "text-red-400"; pts[p.user] = (pts[p.user] || 0); }
                                    } else { res = "ANNULÉ"; cl = "text-slate-500"; }
                                } 
                                else if (p.prono.includes('SETS')) {
                                    let betS = parseInt(p.prono);
                                    if(totalSetsPlayed > 0) {
                                        if (totalSetsPlayed === betS) { res = "GAGNÉ ✅ (+1)"; cl = "text-purple-400"; pts[p.user] = (pts[p.user] || 0) + 1; }
                                        else { res = "PERDU ❌"; cl = "text-red-400"; pts[p.user] = (pts[p.user] || 0); }
                                    } else { res = "ANNULÉ"; cl = "text-slate-500"; }
                                } 
                                else {
                                    if(m.winner === p.prono) { res = "GAGNÉ ✅ (+1)"; cl = "text-green-400"; pts[p.user] = (pts[p.user] || 0) + 1; } 
                                    else { res = "PERDU ❌"; cl = "text-red-400"; pts[p.user] = (pts[p.user] || 0); } 
                                }
                            }

                            let pronoColor = 'text-white';
                            if(p.prono === 'Maxime') pronoColor = 'text-blue-400';
                            else if(p.prono === 'Alan') pronoColor = 'text-red-400';
                            else if(p.prono.includes('SETS') && !p.prono.includes(' en ')) pronoColor = 'text-purple-400';
                            else if(p.prono.includes(' en ')) pronoColor = 'text-amber-400';

                            return `<div class="glass p-4 rounded-2xl flex justify-between items-center text-[10px] font-black uppercase">
                                <div class="flex items-center gap-2"><button onclick="deletePari('${p.id}')" class="text-white/10 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button><span class="text-slate-200">${p.user} : <span class="${pronoColor}">${p.prono}</span></span></div>
                                <span class="${cl} tracking-tight whitespace-nowrap ml-2">${res}</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('') || '<p class="text-center text-slate-600 py-10 uppercase font-bold text-[10px]">Aucun pari placé</p>';

            document.getElementById('leaderboard').innerHTML = Object.entries(pts).sort((a,b)=>b[1]-a[1]).map(([n, p], i) => `
                <div class="flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5 shadow-sm transition-all hover:bg-white/10">
                    <div class="flex items-center gap-3"><span class="w-6 h-6 flex items-center justify-center rounded-full text-[10px] font-black ${i===0?'bg-amber-500 text-slate-950':'bg-slate-800 text-slate-400'}">${i+1}</span><span class="font-black text-xs uppercase text-slate-100">${n}</span></div>
                    <span class="font-black ${i===0?'text-amber-500':'text-blue-400'} italic text-base">${p} <span class="text-[8px] text-slate-500 not-italic ml-0.5">PTS</span></span>
                </div>`).join('') || '<p class="text-center text-slate-700 text-[10px] uppercase py-4">Le classement est vide</p>';
        }

        setInterval(render, 60000);
    </script>
</body>
</html>
